---
layout: default
title: Battle Tanks - Play Now
---

<main class="container-fluid d-flex flex-column align-items-center py-5 mt-5" style="min-height: calc(100vh - 80px); background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);">
    
    <div class="text-center mb-4 animate-fade-in">
        <h1 class="display-4 fw-bold text-uppercase mb-1" style="color: #00ff88; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);">
            Battle Tanks
        </h1>
        <p class="fs-5 text-secondary">Created with Construct 3 by Alien Fossil</p>
    </div>

    <div class="w-100 mx-auto rounded animate-fade-in" style="max-width: 960px; border: 4px solid #333; box-shadow: 0 0 30px rgba(0, 204, 255, 0.2); animation-delay: 0.2s;">
        <div class="ratio ratio-16x9 bg-black">
            <iframe src="minigames/tanks/index.html" title="Battle Tanks" allowfullscreen style="border: none;"></iframe>
        </div>
    </div>

    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between w-100 mx-auto mt-4 p-4 rounded animate-fade-in" style="max-width: 960px; background: rgba(255, 255, 255, 0.05); border: 1px solid #333; animation-delay: 0.4s;">
        
        <div class="text-light mb-3 mb-md-0 w-100">
            <strong class="text-info me-2 fs-5">Controls:</strong>
            <span class="fs-6 text-light">Requires a <span class="badge bg-dark border border-secondary text-info font-monospace mx-1 p-2">MOUSE</span> and <span class="badge bg-dark border border-secondary text-info font-monospace mx-1 p-2">KEYBOARD</span></span>
        </div>
        
        <button class="btn text-uppercase fw-bold d-flex align-items-center flex-shrink-0 ms-md-4 px-4 py-2" onclick="toggleFullScreen()" style="background: transparent; border: 2px solid #00ff88; color: #00ff88; transition: all 0.3s;" onmouseover="this.style.background='#00ff88'; this.style.color='#000'; this.style.boxShadow='0 0 15px rgba(0, 255, 136, 0.5)';" onmouseout="this.style.background='transparent'; this.style.color='#00ff88'; this.style.boxShadow='none';">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" class="me-2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            Fullscreen
        </button>

    </div>
</main>

<script>
    function toggleFullScreen() {
        var iframe = document.querySelector('iframe');
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { /* Safari */
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { /* IE11 */
            iframe.msRequestFullscreen();
        }
    }
</script>
